# ============================================================
# docker-compose.yml — Portcullis + Streamlit frontend + Redis
#
# Quickstart (all three services):
#   docker compose up --build
#
# URLs after startup:
#   UI (Streamlit):  http://localhost:8501
#   API (FastAPI):   http://localhost:8000/api/v1/docs
#   Redis:           localhost:6379 (internal only by default)
# ============================================================

version: "3.9"

services:

  # ------------------------------------------------------------------
  # Streamlit frontend
  # ------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myengine-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - MYENGINE_URL=http://portcullis:8000
      - MYENGINE_API_KEY=${API_KEY:-}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-10}
    depends_on:
      - portcullis
    networks:
      - internal

  # ------------------------------------------------------------------
  # FastAPI backend
  # ------------------------------------------------------------------
  portcullis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portcullis
    # Needed for Docker socket access inside container on Windows/WSL hosts.
    user: "0:0"
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # - REDIS_PASSWORD=secret        # uncomment if Redis requires auth
      # - REDIS_DB=0                   # default database index (0-15)
      # - API_KEY_ENABLED=true         # uncomment to require X-API-Key header
      # - API_KEY=change-me-to-a-strong-secret
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - internal

  # ------------------------------------------------------------------
  # Redis
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: myengine-redis
    restart: unless-stopped
    # Port 6379 is NOT exposed to the host by default.
    # Uncomment the lines below if you need direct Redis access:
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

# ---------------------------------------------------------------------------
# Volumes & networks
# ---------------------------------------------------------------------------
volumes:
  redis_data:

networks:
  internal:
    driver: bridge
